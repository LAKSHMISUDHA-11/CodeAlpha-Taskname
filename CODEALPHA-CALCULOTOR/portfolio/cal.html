<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactile Calculator</title>
    <link rel="stylesheet" href="cal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator">
        <div class="display-container">
            <div id="history" class="history-screen"></div>
            <div id="display" class="main-screen">0</div>
        </div>

        <div class="keypad">
            <button class="btn function" data-action="clear">AC</button>
            <button class="btn function" data-action="toggle-sign">+/-</button>
            <button class="btn function" data-action="percent">%</button>
            <button class="btn operator" data-operator="÷">÷</button>

            <button class="btn digit">7</button>
            <button class="btn digit">8</button>
            <button class="btn digit">9</button>
            <button class="btn operator" data-operator="×">×</button>

            <button class="btn digit">4</button>
            <button class="btn digit">5</button>
            <button class="btn digit">6</button>
            <button class="btn operator" data-operator="−">−</button>

            <button class="btn digit">1</button>
            <button class="btn digit">2</button>
            <button class="btn digit">3</button>
            <button class="btn operator" data-operator="+">+</button>

            <button class="btn digit zero">0</button>
            <button class="btn digit" data-action="decimal">.</button>
            <button class="btn equals" id="equals">=</button>
        </div>
    </div>

    <script src="cal.js"></script>
</body>
</html>
