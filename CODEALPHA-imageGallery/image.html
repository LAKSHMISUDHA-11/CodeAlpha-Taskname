<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery Enhancements</title>
    <link rel="stylesheet" href="image.css">
</head>
<body>

    <header>
        <h1><b>Image Gallery</b></h1>
    </header>

    <section class="gallery-container">
        <div class="gallery" id="galleryGrid">   
            <img src="gallery1.jpeg" alt="image1">
            <img src="gallery2.jpeg" alt="image2">
            <img src="gallery3.jpeg" alt="image3">
            <img src="gallery4.jpeg" alt="image4">
            <img src="gallery5.jpeg" alt="image5">
            <img src="gallery6.jpeg" alt="image6">
            <img src="gallery7.jpeg" alt="image7">
            <img src="gallery8.jpeg" alt="image8">
            <img src="gallery9.jpeg" alt="image9">
            <img src="gallery10.jpeg" alt="image10">
            <img src="gallery11.jpeg" alt="image11">
        </div>
    </section>

    <section class="bottombutton">
        <a href="image.html"></a
        <a href="Next.html"><button>Next</button></a>
    </section>

    <div class="modal-overlay" id="zoomModal">
        <span class="close-btn" id="closeBtn">&times;</span>
        
        <div class="filter-toggle-btn" id="paletteBtn">🎨</div>
        <div class="filter-panel" id="filterPanel">
            <h3>Filters</h3>
            <button class="filter-btn" data-filter="grayscale">Grayscale</button>
            <button class="filter-btn" data-filter="blur">Blur</button>
            <button class="filter-btn" data-filter="brightness">Brightness</button>
            <button class="filter-btn" data-filter="sepia">Sepia</button>
            <button class="filter-btn" data-filter="contrast">Contrast</button>
            <button class="clear-btn" id="clearFiltersBtn">Clear All</button>
        </div>

        <div class="modal-content-wrapper">
            <img id="modalTargetImg" src="" alt="Zoomed View">
        </div>
    </div>

    <script src="image.js"></script>
</body>
</html>
